name: Scraping Data PM2.5 Periodik

on:
  schedule:
    - cron: "*/30 * * * *"   # setiap 30 menit
  workflow_dispatch: {}       # supaya bisa dijalankan manual dari tab Actions

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests pandas

      - name: Jalankan scraping
        run: python scrape.py

      - name: Commit & push data baru
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data_scraping.csv
          git diff --cached --quiet || git commit -m "Tambah data scraping otomatis"
          git push
